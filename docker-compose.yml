services:
  # MongoDB
  cadmus-vpi-mongo:
    image: mongo
    container_name: cadmus-vpi-mongo
    environment:
      - MONGO_DATA_DIR=/data/db
      - MONGO_LOG_DIR=/dev/null
    command: mongod --logpath=/dev/null
    ports:
      - 127.0.0.1:27017:27017
    networks:
      - cadmus-vpi-network

 # PostgreSQL
  cadmus-vpi-pgsql:
    image: postgres
    container_name: cadmus-vpi-pgsql
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    ports:
      - 127.0.0.1:5432:5432
    networks:
      - cadmus-vpi-network

  # Cadmus vpi API
  cadmus-vpi-api:
    image: vedph2020/cadmus-vpi-api:0.0.1
    container_name: cadmus-vpi-api
    ports:
      - 5172:8080
    depends_on:
      - cadmus-vpi-mongo
      - cadmus-vpi-pgsql
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - CONNECTIONSTRINGS__DEFAULT=mongodb://cadmus-vpi-mongo:27017/{0}
      - CONNECTIONSTRINGS__AUTH=Server=cadmus-vpi-pgsql;port=5432;Database={0};User Id=postgres;Password=postgres;Include Error Detail=True
      - CONNECTIONSTRINGS__INDEX=Server=cadmus-vpi-pgsql;port=5432;Database={0};User Id=postgres;Password=postgres;Include Error Detail=True
      - CONNECTIONSTRINGS__MOL=Server=cadmus-vpi-pgsql;port=5432;Database=mol;User Id=postgres;Password=postgres;Include Error Detail=True
      - SERILOG__CONNECTIONSTRING=mongodb://cadmus-vpi-mongo:27017/{0}-log
      - STOCKUSERS__0__PASSWORD=P4ss-W0rd!
      - SEED__DELAY=20
      - MESSAGING__APIROOTURL=http://cadmusapi.azurewebsites.net
      - MESSAGING__APPROOTURL=http://cadmusapi.com/
      - MESSAGING__SUPPORTEMAIL=support@cadmus.com
    networks:
      - cadmus-vpi-network

  # Cadmus vpi App
  cadmus-app:
    image: vedph2020/cadmus-vpi-app:0.0.1
    container_name: cadmus-vpi-app
    ports:
      - 4200:80
    depends_on:
      - cadmus-vpi-api
      # - cadmus-biblio-api
    networks:
      - cadmus-vpi-network

networks:
  cadmus-vpi-network:
    driver: bridge
